schemas:
  response:
    required:
      - date
      - status
      - data
    properties:
      date:
        type: string
        format: date-time
        nullable: false
      status:
        type: integer
        format: int32
        minimum: 100
        maximum: 599
        nullable: false
      pagination:
        type: object
        properties:
          page:
            type: integer
            format: int32
            minimum: 0
          size:
            type: integer
            format: int32
            minimum: 1
          totalElements:
            type: integer
            format: int64
            minimum: 0
          totalPages:
            type: integer
            format: int32
            minimum: 0
        nullable: true
      data:
        type: object
        nullable: true
  responseError:
    required:
      - date
      - status
      - title
      - detail
    properties:
      date:
        type: string
        format: date-time
        nullable: false
      status:
        type: integer
        format: int32
        minimum: 100
        maximum: 599
        nullable: false
      title:
        type: string
        nullable: false
      detail:
        type: string
        nullable: false

parameters:
  page:
    name: page
    in: query
    description: Page number (zero-based)
    required: false
    schema:
      type: integer
      format: int32
      minimum: 0
      default: 0
  size:
    name: size
    in: query
    description: Page size
    required: false
    schema:
      type: integer
      format: int32
      minimum: 1
      default: 100